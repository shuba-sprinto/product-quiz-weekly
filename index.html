<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Sprinto Knowledge Audit</title>
<style>
  :root{
    --bg:#221830; --surface:#2E2240; --surface-hi:#382A4E; --line:#463659;
    --text:#F0EBF7; --muted:#A392BA; --lime:#C8F135; --coral:#F0765C; --amber:#E8B24A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    display:flex; justify-content:center; padding:0 0 48px;}
  .wrap{width:100%; max-width:560px; padding:0 20px;}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.12em; text-transform:uppercase;}
  button{font-family:inherit; cursor:pointer;}
  .card-btn{display:block; width:100%; text-align:left; background:var(--surface);
    border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:12px; color:var(--text);}
  .card-btn.done-seg{border-color:var(--lime);}
  .opt{display:block; width:100%; text-align:left; background:var(--surface); color:var(--text);
    border:1px solid var(--line); border-radius:12px; padding:13px 15px; font-size:14.5px;
    line-height:1.4; margin-bottom:9px;}
  .opt .letter{font-family:ui-monospace,Menlo,monospace; letter-spacing:.12em; font-size:10px;
    color:var(--muted); margin-right:10px;}
  .opt.correct{border-color:var(--lime); background:rgba(200,241,53,.08);}
  .opt.correct .letter{color:var(--lime);}
  .opt.wrongpick{border-color:var(--coral); background:rgba(240,118,92,.08);}
  .opt.dim{color:var(--muted);}
  .idk{display:block; width:100%; text-align:center; background:transparent; color:var(--muted);
    border:1px dashed var(--line); border-radius:12px; padding:12px; font-size:13.5px; margin-top:2px;}
  .idk.picked{color:var(--amber); border-color:var(--amber);}
  .primary{width:100%; background:var(--lime); color:#1C1426; border:none; border-radius:12px;
    padding:15px; font-size:15px; font-weight:700; margin-top:15px;}
  .ghost{flex:1; background:transparent; color:var(--lime); border:1px solid var(--lime);
    border-radius:12px; padding:14px; font-size:14px; font-weight:700;}
  .feedback{margin-top:16px; background:var(--surface-hi); border-radius:12px; padding:15px 17px;
    font-size:13.5px; line-height:1.6;}
  .bar-track{display:flex; height:8px; border-radius:4px; overflow:hidden; background:var(--surface);}
  .prog-track{height:3px; background:var(--surface); border-radius:2px; margin-bottom:24px;}
  .prog-fill{height:3px; background:var(--lime); border-radius:2px; transition:width .25s;}
  .stat{flex:1; background:var(--surface); border-radius:12px; padding:13px 12px;}
  h1{font-size:32px; line-height:1.15; margin:0 0 12px; font-weight:800;}
  h2{font-size:18.5px; line-height:1.45; font-weight:700; margin:0 0 18px;}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;}
  #gate .box{width:100%;max-width:360px;padding:0 24px;text-align:center;}
  #gate input{width:100%;box-sizing:border-box;background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;font-size:16px;color:var(--text);text-align:center;outline:none;}
  #gate input:focus{border-color:var(--lime);}
  #gate .err{color:var(--coral);font-size:13px;min-height:18px;margin-top:10px;}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <div class="mono" style="font-size:11px;color:var(--lime);margin-bottom:14px">Sprinto · Internal</div>
    <h1 style="font-size:26px;margin:0 0 6px">Knowledge Audit<span style="color:var(--lime)">.</span></h1>
    <p style="color:var(--muted);font-size:13.5px;margin:0 0 22px">This quiz contains internal pricing. Enter the team password.</p>
    <input id="pw" type="password" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')unlock()">
    <div class="err" id="pwerr"></div>
    <button class="primary" onclick="unlock()">Enter</button>
  </div>
</div>
<div class="wrap" id="app" style="display:none"></div>
<script>
const C = {
  bg: "#221830", surface: "#2E2240", surfaceHi: "#382A4E", line: "#463659",
  text: "#F0EBF7", muted: "#A392BA", lime: "#C8F135", coral: "#F0765C", amber: "#E8B24A",

// Shuffle option order at quiz start so correct answers are evenly spread across A–D
const shuffleQ = (q) => {
  const order = q.opts.map((_, i) => i).sort(() => Math.random() - 0.5);
  return { ...q, opts: order.map((i) => q.opts[i]), ans: order.indexOf(q.ans) };
};

      { sec: "Product", q: "The SOC 2 Type 1 timeline quoted to startups is:", opts: ["Under 1 week", "3–6 weeks", "3 months", "6 months"], ans: 1, why: "3–4 weeks setup plus a short audit — 3–6 weeks end to end (Retailium, Breeze, Chapter deals)." },
      { sec: "Product", q: "How many hours of client-side effort does a small startup need to get audit-ready on Sprinto?", opts: ["8–10 hours", "40–50 hours", "100+ hours", "300+ hours"], ans: 0, why: "8–10 hours is the number for small startups (Nikhat's Chapter call, Amulya's Modern AI call; up to ~15 hrs in others)." },

    Market: "Pricing anchors and the Vanta/Thoropass/Rippling competitive set are where startup deals swing. The Channl.ai and Precepi calls on Fireflies are the two sharpest 30-minute studies.",
  },

    Product: "SMB demos lean on SprintoX, Dr. Sprinto, readiness scores, and the Foundation/Growth split. The ZeroTeq and Stackular calls on Fireflies cover almost all of it.",
    Market: "Know the discount floor ($9K→$5K happened), the ₹5L India anchor, and the payment-flexibility levers — these decide SMB deals.",
  },

// ————— Password gate —————
const PW_HASH = "a0bb03b76f3f7fda81b04dc1d0a83e43843b2e340fe936646b420d8b4d344993";
async function sha256hex(str){
  if (window.crypto && crypto.subtle){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  return null;
}
async function unlock(){
  const val = document.getElementById("pw").value;
  let ok = false;
  const h = await sha256hex(val);
  if (h !== null) ok = (h === PW_HASH);
  else ok = (btoa(val) === "c21iQHNwcmludG8h");
  if (ok){
    document.getElementById("gate").remove();
    document.getElementById("app").style.display = "block";
    render();
  } else {
    document.getElementById("pwerr").textContent = "Incorrect password — try again.";
    document.getElementById("pw").select();
  }
}

// ————— App state —————
let S = { screen:"home", seg:null, idx:0, picked:null, answers:[], quizQs:null, done:{} };
const app = document.getElementById("app");
const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function startSeg(name){
  const seg = SEGMENTS.find(x=>x.name===name);
  S = {...S, screen:"quiz", seg:name, idx:0, picked:null, answers:[], quizQs:seg.questions.map(shuffleQ)};
  render();
}
function choose(val){
  if(S.picked!==null) return;
  const q = S.quizQs[S.idx];
  const result = val==="idk" ? "idk" : (val===q.ans ? "correct" : "wrong");
  S.picked = val; S.answers = [...S.answers, {result}];
  render();
}
function next(){
  const seg = SEGMENTS.find(x=>x.name===S.seg);
  if(S.idx+1 < seg.questions.length){ S.idx++; S.picked=null; }
  else { S.done = {...S.done, [S.seg]:S.answers}; S.screen="results"; }
  render();
}
function goHome(){ S.screen="home"; S.seg=null; render(); }

function render(){
  if(S.screen==="home") return renderHome();
  if(S.screen==="results") return renderResults();
  renderQuiz();
}

function renderHome(){
  const cards = SEGMENTS.map(s=>{
    const res = S.done[s.name];
    const score = res ? res.filter(a=>a.result==="correct").length : null;
    return `<button class="card-btn ${res?'done-seg':''}" onclick="startSeg('${s.name}')">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:18px;font-weight:800">${s.name}</span>
        <span class="mono" style="font-size:10px;color:${res?'var(--lime)':'var(--muted)'}">${res?score+"/30 · retake":"30 controls"}</span>
      </div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:4px">${s.tag}</div>
    </button>`;
  }).join("");
  let full = "";
  if(Object.keys(S.done).length===3){
    const c = Object.values(S.done).reduce((n,a)=>n+a.filter(x=>x.result==="correct").length,0);
    const g = Object.values(S.done).reduce((n,a)=>n+a.filter(x=>x.result==="idk").length,0);
    full = `<div style="margin-top:20px;background:var(--surface-hi);border-radius:14px;padding:16px 18px">
      <div class="mono" style="font-size:10px;color:var(--lime);margin-bottom:8px">Full audit complete</div>
      <div style="font-size:14px;line-height:1.6">Overall: ${c}/90 correct · ${g} gaps logged.</div></div>`;
  }
  app.innerHTML = `<div style="padding-top:48px">
    <div class="mono" style="font-size:11px;color:var(--lime);margin-bottom:14px">Sprinto · New Business Sales</div>
    <h1>Knowledge Audit<span style="color:var(--lime)">.</span></h1>
    <p style="color:var(--muted);font-size:14.5px;line-height:1.6;margin:0 0 28px">
      Three segment audits, 30 controls each — 20 on product, 10 on competition, pricing and market.
      Every question is sourced from the team's real prospect calls this month.
      "I don't know" logs an honest gap instead of a guess — gaps are fixable, lucky guesses aren't.</p>
    ${cards}${full}</div>`;
}

function renderQuiz(){
  const seg = SEGMENTS.find(x=>x.name===S.seg);
  const total = seg.questions.length;
  const q = S.quizQs[S.idx];
  const answered = S.picked!==null;
  const result = answered ? S.answers[S.idx].result : null;
  const opts = q.opts.map((opt,i)=>{
    let cls="opt";
    if(answered){
      if(i===q.ans) cls+=" correct";
      else if(S.picked===i) cls+=" wrongpick";
      else cls+=" dim";
    }
    return `<button class="${cls}" onclick="choose(${i})"><span class="letter">${String.fromCharCode(65+i)}</span>${esc(opt)}</button>`;
  }).join("");
  let feedback="";
  if(answered){
    const tone = result==="correct"?"var(--lime)":result==="idk"?"var(--amber)":"var(--coral)";
    const label = result==="correct"?"✓ Passing":result==="idk"?"◦ Gap logged":"✕ Failing";
    const ansNote = result!=="correct" ? `<span style="color:var(--muted)">&nbsp;&nbsp;·&nbsp;&nbsp;answer: ${String.fromCharCode(65+q.ans)}</span>` : "";
    feedback = `<div class="feedback">
      <div class="mono" style="font-size:10px;margin-bottom:8px;color:${tone}">${label}${ansNote}</div>
      <div>${esc(q.why)}</div></div>
      <button class="primary" onclick="next()">${S.idx+1<total?"Next control":"View audit report"}</button>`;
  }
  app.innerHTML = `<div style="padding-top:26px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="mono" style="font-size:10px;color:var(--lime)">${seg.name} · ${q.sec==="Market"?"Competition / Pricing / Market":"Product"}</span>
      <span class="mono" style="font-size:10px;color:var(--muted)">${String(S.idx+1).padStart(2,"0")}/${total}</span>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${((S.idx+(answered?1:0))/total)*100}%"></div></div>
    <h2>${esc(q.q)}</h2>
    ${opts}
    <button class="idk ${S.picked==='idk'?'picked':''}" onclick="choose('idk')">I don't know — log it as a gap</button>
    ${feedback}</div>`;
  window.scrollTo(0,0);
}

function renderResults(){
  const seg = SEGMENTS.find(x=>x.name===S.seg);
  const qs = seg.questions, total = qs.length, res = S.done[S.seg];
  const count = t => res.filter(a=>a.result===t).length;
  const correct=count("correct"), wrong=count("wrong"), idk=count("idk");
  const pct = Math.round((correct/total)*100);
  const bySec = ["Product","Market"].map(sec=>{
    const idxs = qs.map((q,i)=>q.sec===sec?i:-1).filter(i=>i>=0);
    const f = t => idxs.filter(i=>res[i].result===t).length;
    return {sec, label: sec==="Market"?"Competition · Pricing · Market":"Product", c:f("correct"), w:f("wrong"), g:f("idk"), n:idxs.length};
  });
  const verdict = pct>=90?`Audit ready — you can run a ${S.seg} call cold.`
    : pct>=75?"Substantially compliant. A few controls to remediate."
    : pct>=50?"Partial coverage — good instincts, gaps in the details reps quote daily."
    : "Observation period recommended — the remediation notes below will close this fast.";
  const stats = [["Correct",correct,"var(--lime)"],["Wrong",wrong,"var(--coral)"],["Gaps",idk,"var(--amber)"]]
    .map(([l,n,c])=>`<div class="stat" style="border-top:2px solid ${c}">
      <div style="font-size:24px;font-weight:800">${n}</div>
      <div class="mono" style="font-size:9px;color:var(--muted);margin-top:2px">${l}</div></div>`).join("");
  const bars = bySec.map(b=>`<div style="margin-bottom:15px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
        <span>${b.label}</span><span style="color:var(--muted)">${b.c}/${b.n}</span></div>
      <div class="bar-track">
        <div style="width:${(b.c/b.n)*100}%;background:var(--lime)"></div>
        <div style="width:${(b.w/b.n)*100}%;background:var(--coral)"></div>
        <div style="width:${(b.g/b.n)*100}%;background:var(--amber)"></div></div></div>`).join("");
  const weak = bySec.filter(b=>b.c/b.n<0.75);
  const remed = weak.length ? `<div style="margin-top:24px">
      <div class="mono" style="font-size:10px;color:var(--amber);margin-bottom:12px">Remediation plan</div>
      ${weak.map(b=>`<div style="background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;margin-bottom:4px">${b.label}</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.55">${esc(REMEDIATION[S.seg][b.sec])}</div></div>`).join("")}</div>` : "";
  const gapNote = idk>0 ? `<p style="font-size:13px;color:var(--muted);line-height:1.55;margin-top:18px">
      ${idk} ${idk===1?"gap":"gaps"} flagged honestly instead of guessed — gaps are fixable; miscalibration isn't visible.</p>` : "";
  app.innerHTML = `<div style="padding-top:40px">
    <div class="mono" style="font-size:11px;color:var(--lime);margin-bottom:14px">${S.seg} · audit report</div>
    <div style="display:flex;align-items:baseline;gap:12px">
      <span style="font-size:60px;font-weight:800;line-height:1">${pct}%</span>
      <span class="mono" style="font-size:11px;color:var(--muted)">readiness</span></div>
    <p style="font-size:15px;line-height:1.5;margin:8px 0 22px">${verdict}</p>
    <div style="display:flex;gap:8px;margin-bottom:26px">${stats}</div>
    ${bars}${remed}${gapNote}
    <div style="display:flex;gap:10px;margin-top:26px">
      <button class="ghost" onclick="startSeg('${S.seg}')">Retake</button>
      <button class="primary" style="flex:1;margin-top:0" onclick="goHome()">All segments</button></div></div>`;
  window.scrollTo(0,0);
}

document.getElementById('pw').focus();
</script>
